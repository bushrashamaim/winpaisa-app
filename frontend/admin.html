<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINPAISA - Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #606c92 0%, #5a6586 100%);
            min-height: 100vh;
        }
        .admin-login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(148, 127, 127, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-box {
            background: linear-gradient(145deg, #98a0c7, #808cc4);
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 350px;
            border: 2px solid #ffaa44;
            text-align: center;
        }
        .login-box h2 { color: #ffaa33; margin-bottom: 20px; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a2f4a;
            border: none;
            border-radius: 50px;
            color: white;
            text-align: center;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #ffaa33;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }
        .dashboard {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-header {
            background: linear-gradient(135deg, #1a1f35, #11152a);
            padding: 15px 25px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border: 1px solid #ffaa44;
        }
        .admin-header h1 { color: #ffaa33; font-size: 24px; }
        .logout-btn {
            background: #ff5555;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            border: none;
            color: white;
            font-weight: bold;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #515569, #858fc0);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #ffaa44;
        }
        .stat-card h3 { font-size: 32px; color: #ffaa33; margin: 10px 0; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 25px;
            background: #414a70;
            border: none;
            border-radius: 50px;
            color: #ffdd99;
            cursor: pointer;
            font-weight: bold;
        }
        .tab-btn.active { background: #ffaa33; color: #1a1a2a; }
        .table-container {
            background: #2f3969;
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2a2f4a; }
        th { color: #ffaa33; }
        .approve-btn {
            background: #44ff44;
            color: #1a1a2a;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 5px;
        }
        .reject-btn {
            background: #ff5555;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .section { display: none; }
        .section.active { display: block; }
        .add-balance-form {
            background: #1a1f35;
            padding: 25px;
            border-radius: 20px;
            max-width: 500px;
        }
        .add-balance-form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a2f4a;
            border: none;
            border-radius: 30px;
            color: white;
        }
        .add-balance-form button {
            width: 100%;
            padding: 12px;
            background: #ffaa33;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .badge {
            background: #ff5555;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 8px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ffaa33;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            animation: fadeInOut 3s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(100px); }
            15% { opacity: 1; transform: translateX(0); }
            85% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .status-pending { color: #ffaa33; font-weight: bold; }
        .status-approved { color: #44ff44; font-weight: bold; }
        .status-rejected { color: #ff5555; font-weight: bold; }
    </style>
</head>
<body>
    <div id="adminLogin" class="admin-login">
        <div class="login-box">
            <h2>👑 ADMIN LOGIN</h2>
            <input type="password" id="adminPassword" placeholder="Enter Admin Password">
            <button onclick="adminLogin()">Login</button>
            <p style="margin-top: 15px;">Password: <strong>admin123</strong></p>
        </div>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="admin-header">
            <h1>👑 WINPAISA ADMIN DASHBOARD</h1>
            <button class="logout-btn" onclick="adminLogout()">Logout</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><p>Total Users</p><h3 id="totalUsers">0</h3></div>
            <div class="stat-card"><p>Total Deposits</p><h3 id="totalDeposits">0</h3><small>PKR</small></div>
            <div class="stat-card"><p>Total Withdrawals</p><h3 id="totalWithdrawals">0</h3><small>PKR</small></div>
            <div class="stat-card"><p>Platform Balance</p><h3 id="platformBalance">0</h3><small>PKR</small></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showSection('pending')">💰 Pending Deposits <span id="pendingBadge" class="badge">0</span></button>
            <button class="tab-btn" onclick="showSection('allDeposits')">📋 All Deposits</button>
            <button class="tab-btn" onclick="showSection('withdrawals')">💸 Withdrawals <span id="withdrawPendingBadge" class="badge">0</span></button>
            <button class="tab-btn" onclick="showSection('users')">👥 Users</button>
            <button class="tab-btn" onclick="showSection('addBalance')">➕ Add Balance</button>
        </div>

        <div id="pendingSection" class="section active">
            <div class="table-container">
                <h3>⏳ Pending Deposits</h3>
                <div id="pendingDepositsList"></div>
            </div>
        </div>

        <div id="allDepositsSection" class="section">
            <div class="table-container"><h3>📋 All Deposits</h3><div id="allDepositsList"></div></div>
        </div>

        <div id="withdrawalsSection" class="section">
            <div class="table-container"><h3>💸 Withdrawal Requests</h3><div id="withdrawalsList"></div></div>
        </div>

        <div id="usersSection" class="section">
            <div class="table-container"><h3>👥 All Users</h3><div id="usersList"></div></div>
        </div>

        <div id="addBalanceSection" class="section">
            <div class="add-balance-form">
                <h3>➕ Add Balance Manually</h3>
                <input type="text" id="addUserId" placeholder="User ID">
                <input type="text" id="userMobile" placeholder="OR Mobile Number">
                <input type="number" id="addAmount" placeholder="Amount (PKR)">
                <button onclick="addManualBalance()">Add Balance</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "admin123";

        function showToast(msg, isErr) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            if(isErr) toast.style.background = '#ff5555';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function adminLogin() {
            if(document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                refreshAll();
                showToast('Login successful!', false);
            } else {
                showToast('Wrong password!', true);
            }
        }

        function adminLogout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(section + 'Section').classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function refreshAll() {
            updateStats();
            loadPendingDeposits();
            loadAllDeposits();
            loadWithdrawals();
            loadUsers();
        }

        function updateStats() {
            let users = localStorage.getItem('winpaisa_users');
            let deposits = localStorage.getItem('winpaisa_deposits');
            let withdrawals = localStorage.getItem('winpaisa_withdrawals');
            
            try {
                users = users ? JSON.parse(users) : [];
                deposits = deposits ? JSON.parse(deposits) : [];
                withdrawals = withdrawals ? JSON.parse(withdrawals) : [];
            } catch(e) {
                users = [];
                deposits = [];
                withdrawals = [];
            }
            
            if (!Array.isArray(users)) users = [];
            if (!Array.isArray(deposits)) deposits = [];
            if (!Array.isArray(withdrawals)) withdrawals = [];
            
            const totalUsers = users.length;
            const totalDeposits = deposits.filter(d => d && d.status === 'approved').reduce((sum, d) => sum + (d.amount || 0), 0);
            const totalWithdrawals = withdrawals.filter(w => w && w.status === 'approved').reduce((sum, w) => sum + (w.amount || 0), 0);
            const totalBalance = users.reduce((sum, u) => sum + (u.balance || 0), 0);
            
            document.getElementById('totalUsers').innerText = totalUsers;
            document.getElementById('totalDeposits').innerText = totalDeposits;
            document.getElementById('totalWithdrawals').innerText = totalWithdrawals;
            document.getElementById('platformBalance').innerText = totalBalance;
        }

        function loadPendingDeposits() {
            const container = document.getElementById('pendingDepositsList');
            
            let deposits = localStorage.getItem('winpaisa_deposits');
            try {
                deposits = deposits ? JSON.parse(deposits) : [];
            } catch(e) {
                deposits = [];
            }
            
            if (!Array.isArray(deposits)) deposits = [];
            
            const pending = deposits.filter(d => d && d.status === 'pending');
            
            document.getElementById('pendingBadge').innerText = pending.length;
            
            if(pending.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;">✅ No pending deposits</div>';
                return;
            }
            
            let html = `<table><thead><tr><th>ID</th><th>User</th><th>Mobile</th><th>Amount</th><th>Transaction ID</th><th>Date</th><th>Action</th></tr></thead><tbody>`;
            
            pending.forEach(d => {
                html += `<tr>
                    <td>${d.id || 'N/A'}</td>
                    <td>${d.userName || 'N/A'}</td>
                    <td>${d.userMobile || 'N/A'}</td>
                    <td><strong>${d.amount || 0} PKR</strong></td>
                    <td>${d.transactionId || 'N/A'}</td>
                    <td>${d.timestamp || new Date(d.createdAt).toLocaleString()}</td>
                    <td>
                        <button class="approve-btn" onclick="approveDeposit(${d.id})">✅ Approve</button>
                        <button class="reject-btn" onclick="rejectDeposit(${d.id})">❌ Reject</button>
                    </td>
                </tr>`;
            });
            
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function approveDeposit(id) {
            if(!confirm('Approve this deposit? User will get balance added.')) return;
            
            let usersStr = localStorage.getItem('winpaisa_users');
            let depositsStr = localStorage.getItem('winpaisa_deposits');
            
            let users = [];
            let deposits = [];
            
            try {
                users = usersStr ? JSON.parse(usersStr) : [];
                deposits = depositsStr ? JSON.parse(depositsStr) : [];
            } catch(e) {
                users = [];
                deposits = [];
            }
            
            if (!Array.isArray(users)) users = [];
            if (!Array.isArray(deposits)) deposits = [];
            
            const deposit = deposits.find(d => d && d.id === id);
            if(!deposit || deposit.status !== 'pending') {
                showToast('Invalid deposit', true);
                return;
            }
            
            const user = users.find(u => u && u.id === deposit.userId);
            if(user) {
                user.balance = (user.balance || 0) + deposit.amount;
                user.totalDeposited = (user.totalDeposited || 0) + deposit.amount;
            }
            
            deposit.status = 'approved';
            
            localStorage.setItem('winpaisa_users', JSON.stringify(users));
            localStorage.setItem('winpaisa_deposits', JSON.stringify(deposits));
            
            const currUser = localStorage.getItem('winpaisa_user');
            if(currUser && user) {
                let cu = JSON.parse(currUser);
                if(cu.id === user.id) {
                    cu.balance = user.balance;
                    localStorage.setItem('winpaisa_user', JSON.stringify(cu));
                }
            }
            
            showToast(`✅ ${deposit.amount} PKR approved and added to user balance!`, false);
            refreshAll();
        }

        function rejectDeposit(id) {
            if(!confirm('Reject this deposit?')) return;
            
            let depositsStr = localStorage.getItem('winpaisa_deposits');
            let deposits = [];
            try {
                deposits = depositsStr ? JSON.parse(depositsStr) : [];
            } catch(e) {
                deposits = [];
            }
            
            if (!Array.isArray(deposits)) deposits = [];
            
            const deposit = deposits.find(d => d && d.id === id);
            if(deposit && deposit.status === 'pending') {
                deposit.status = 'rejected';
                localStorage.setItem('winpaisa_deposits', JSON.stringify(deposits));
                showToast(`❌ Deposit rejected`, false);
                refreshAll();
            }
        }

        function loadAllDeposits() {
            const container = document.getElementById('allDepositsList');
            let deposits = localStorage.getItem('winpaisa_deposits');
            try {
                deposits = deposits ? JSON.parse(deposits) : [];
            } catch(e) { deposits = []; }
            
            if(deposits.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;">No deposits</div>';
                return;
            }
            let html = `<table><thead><tr><th>ID</th><th>User</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead><tbody>`;
            deposits.forEach(d => {
                let statusClass = '';
                if(d.status === 'approved') statusClass = 'status-approved';
                else if(d.status === 'rejected') statusClass = 'status-rejected';
                else statusClass = 'status-pending';
                html += `<tr>
                    <td>${d.id}${d.userId ? ` (${d.userId})` : ''}</td>
                    <td>${d.userName}${d.userMobile ? `<br><small>${d.userMobile}</small>` : ''}</td>
                    <td>${d.amount} PKR</td>
                    <td class="${statusClass}">${d.status || 'pending'}</td>
                    <td>${d.timestamp || '-'}</td>
                </tr>`;
            });
            html += `</tbody> licensierad`;
            container.innerHTML = html;
        }

        // ============ WITHDRAWAL FUNCTIONS WITH APPROVE/REJECT ============
        
        function loadWithdrawals() {
            const container = document.getElementById('withdrawalsList');
            let withdrawals = localStorage.getItem('winpaisa_withdrawals');
            try {
                withdrawals = withdrawals ? JSON.parse(withdrawals) : [];
            } catch(e) { withdrawals = []; }
            
            if(!Array.isArray(withdrawals)) withdrawals = [];
            
            const pendingWithdrawals = withdrawals.filter(w => w && w.status === 'pending');
            document.getElementById('withdrawPendingBadge').innerText = pendingWithdrawals.length;
            
            if(withdrawals.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;">No withdrawal requests</div>';
                return;
            }
            
            let html = ` <table> <thead> <tr> <th>ID</th> <th>User</th> <th>Amount</th> <th>Account Type</th> <th>Account Number</th> <th>Status</th> <th>Date</th> <th>Action</th> </tr> </thead> <tbody>`;
            
            withdrawals.forEach(w => {
                let statusClass = '';
                if(w.status === 'approved') statusClass = 'status-approved';
                else if(w.status === 'rejected') statusClass = 'status-rejected';
                else statusClass = 'status-pending';
                
                html += `<tr>
                    <td>${w.id || 'N/A'}${w.userId ? `<br><small>ID:${w.userId}</small>` : ''}</td>
                    <td>${w.userName || 'N/A'}<br><small>${w.userMobile || ''}</small></td>
                    <td><strong>${w.amount || 0} PKR</strong></td>
                    <td>${w.paymentMethod || w.accountType || 'JazzCash/EasyPaisa'}</td>
                    <td>${w.accountNumber || w.account || 'N/A'}</td>
                    <td class="${statusClass}">${w.status === 'pending' ? '⏳ Pending' : (w.status === 'approved' ? '✅ Approved' : '❌ Rejected')}</td>
                    <td>${w.timestamp || new Date(w.createdAt).toLocaleString()}</td>
                    <td>
                        ${w.status === 'pending' ? `
                            <button class="approve-btn" onclick="approveWithdrawal(${w.id})">✅ Approve</button>
                            <button class="reject-btn" onclick="rejectWithdrawal(${w.id})">❌ Reject</button>
                        ` : (w.status === 'approved' ? '✅ Completed' : '❌ Cancelled')}
                    </td>
                </tr>`;
            });
            
            html += `</tbody> </table>`;
            container.innerHTML = html;
        }

        function approveWithdrawal(id) {
            if(!confirm('Approve this withdrawal? Amount will be deducted from user balance.')) return;
            
            let usersStr = localStorage.getItem('winpaisa_users');
            let withdrawalsStr = localStorage.getItem('winpaisa_withdrawals');
            
            let users = [];
            let withdrawals = [];
            
            try {
                users = usersStr ? JSON.parse(usersStr) : [];
                withdrawals = withdrawalsStr ? JSON.parse(withdrawalsStr) : [];
            } catch(e) {
                users = [];
                withdrawals = [];
            }
            
            if(!Array.isArray(users)) users = [];
            if(!Array.isArray(withdrawals)) withdrawals = [];
            
            const withdrawal = withdrawals.find(w => w && w.id === id);
            if(!withdrawal || withdrawal.status !== 'pending') {
                showToast('Invalid withdrawal request', true);
                return;
            }
            
            // Find user by userId or mobile
            let user = users.find(u => u && u.id === withdrawal.userId);
            if(!user && withdrawal.userMobile) {
                user = users.find(u => u && u.mobile === withdrawal.userMobile);
            }
            
            if(user) {
                if((user.balance || 0) >= withdrawal.amount) {
                    user.balance = (user.balance || 0) - withdrawal.amount;
                    withdrawal.status = 'approved';
                    
                    localStorage.setItem('winpaisa_users', JSON.stringify(users));
                    localStorage.setItem('winpaisa_withdrawals', JSON.stringify(withdrawals));
                    
                    // Update current session if same user
                    const currUser = localStorage.getItem('winpaisa_user');
                    if(currUser && user) {
                        let cu = JSON.parse(currUser);
                        if(cu.id === user.id || cu.mobile === user.mobile) {
                            cu.balance = user.balance;
                            localStorage.setItem('winpaisa_user', JSON.stringify(cu));
                        }
                    }
                    
                    showToast(`✅ Withdrawal of ${withdrawal.amount} PKR approved! Balance deducted.`, false);
                } else {
                    showToast(`❌ Insufficient balance! User has only ${user.balance} PKR`, true);
                    return;
                }
            } else {
                showToast('User not found!', true);
                return;
            }
            
            refreshAll();
        }

        function rejectWithdrawal(id) {
            if(!confirm('Reject this withdrawal request?')) return;
            
            let withdrawalsStr = localStorage.getItem('winpaisa_withdrawals');
            let withdrawals = [];
            
            try {
                withdrawals = withdrawalsStr ? JSON.parse(withdrawalsStr) : [];
            } catch(e) {
                withdrawals = [];
            }
            
            if(!Array.isArray(withdrawals)) withdrawals = [];
            
            const withdrawal = withdrawals.find(w => w && w.id === id);
            if(withdrawal && withdrawal.status === 'pending') {
                withdrawal.status = 'rejected';
                localStorage.setItem('winpaisa_withdrawals', JSON.stringify(withdrawals));
                showToast(`❌ Withdrawal request rejected`, false);
                refreshAll();
            }
        }

        function loadUsers() {
            const container = document.getElementById('usersList');
            let users = localStorage.getItem('winpaisa_users');
            try {
                users = users ? JSON.parse(users) : [];
            } catch(e) { users = []; }
            
            if(users.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;">No users</div>';
                return;
            }
            let html = ` <table> <thead> <tr> <th>ID</th> <th>Name</th> <th>Mobile</th> <th>Balance</th> <th>Deposited</th> <th>Joined</th> </tr> </thead> <tbody>`;
            users.forEach(u => {
                html += `<tr>
                    <td>${u.id}</td>
                    <td>${u.name || u.fullName || '-'}</td>
                    <td>${u.mobile}</td>
                    <td><strong style="color:#44ff44;">${u.balance || 0} PKR</strong></td>
                    <td>${u.totalDeposited || 0} PKR</td>
                    <td>${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '-'}</td>
                </tr>`;
            });
            html += `</tbody> </table>`;
            container.innerHTML = html;
        }

        function addManualBalance() {
            const userId = document.getElementById('addUserId').value;
            const mobile = document.getElementById('userMobile').value;
            const amount = parseInt(document.getElementById('addAmount').value);
            
            if(!amount || amount <= 0) { showToast('Enter amount', true); return; }
            
            let users = localStorage.getItem('winpaisa_users');
            let deposits = localStorage.getItem('winpaisa_deposits');
            
            try {
                users = users ? JSON.parse(users) : [];
                deposits = deposits ? JSON.parse(deposits) : [];
            } catch(e) {
                users = [];
                deposits = [];
            }
            
            if (!Array.isArray(users)) users = [];
            if (!Array.isArray(deposits)) deposits = [];
            
            let user = userId ? users.find(u => u.id == userId) : users.find(u => u.mobile === mobile);
            if(!user) { showToast('User not found', true); return; }
            
            user.balance = (user.balance || 0) + amount;
            user.totalDeposited = (user.totalDeposited || 0) + amount;
            
            deposits.push({
                id: Date.now(),
                userId: user.id,
                userName: user.name,
                userMobile: user.mobile,
                amount: amount,
                transactionId: `MANUAL_${Date.now()}`,
                timestamp: new Date().toLocaleString(),
                status: 'approved'
            });
            
            localStorage.setItem('winpaisa_users', JSON.stringify(users));
            localStorage.setItem('winpaisa_deposits', JSON.stringify(deposits));
            
            const curr = localStorage.getItem('winpaisa_user');
            if(curr) {
                let cu = JSON.parse(curr);
                if(cu.id === user.id) {
                    cu.balance = user.balance;
                    localStorage.setItem('winpaisa_user', JSON.stringify(cu));
                }
            }
            
            showToast(`✅ ${amount} PKR added to ${user.name}`, false);
            document.getElementById('addUserId').value = '';
            document.getElementById('userMobile').value = '';
            document.getElementById('addAmount').value = '';
            refreshAll();
        }

        // Check if already logged in
        if(localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            refreshAll();
        }
    </script>
</body>
</html>
